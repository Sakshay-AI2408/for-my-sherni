<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>For My Sherni ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Falling Roses -->
  <div class="rose-container">
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
  </div>

  <!-- Title -->
  <h1 class="main-title">
    For My Sherni, Mrinali ❤️
  </h1>

  <!-- Envelope -->
  <div class="envlope-wrapper">

    <div id="envelope" class="close">

      <div class="front flap"></div>
      <div class="front pocket"></div>

      <!-- Letter -->
      <div class="letter">

        <div class="message">

          <h2>My Dearest Mrinali ❤️</h2>

          <div id="typing-text"></div>

          <p class="love-line">
            I love you, Mrinali. Always. ❤️
          </p>

          <p class="ending">
            If possible... forgive me...
          </p>

          <p class="signature">
            — Yours Forever ❤️
          </p>

        </div>

      </div>

      <!-- Hearts -->
      <div class="hearts">
        <div class="heart a1"></div>
        <div class="heart a2"></div>
        <div class="heart a3"></div>
      </div>

    </div>

  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button id="open">Open Letter ❤️</button>
    <button id="reset">Close</button>
  </div>

  <!-- Music -->
  <audio id="bg-music" loop preload="auto">
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>

</body>

</html>
