<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>For My Sherni ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #ffe6eb, #f7d9ff);
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Poppins", sans-serif;
      position: relative;
    }

    .main-title {
      text-align: center;
      margin-top: 30px;
      font-family: "Dancing Script", cursive;
      font-size: 3rem;
      color: #c2185b;
      z-index: 2;
      position: relative;
    }

    .envlope-wrapper {
      height: 700px;
    }

    #envelope {
      position: relative;
      width: 420px;
      height: 300px;
      margin-left: auto;
      margin-right: auto;
      top: 120px;
      background-color: #d6336c;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 2;
    }

    .front {
      position: absolute;
      width: 0;
      height: 0;
      z-index: 3;
    }

    .flap {
      border-left: 210px solid transparent;
      border-right: 210px solid transparent;
      border-bottom: 140px solid transparent;
      border-top: 160px solid #d6336c;
      transform-origin: top;
      pointer-events: none;
    }

    .pocket {
      border-left: 210px solid #ff8fab;
      border-right: 210px solid #ff8fab;
      border-bottom: 150px solid #ff5d8f;
      border-top: 150px solid transparent;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .letter {
      position: relative;
      background: white;
      width: 92%;
      height: 95%;
      margin-left: auto;
      margin-right: auto;
      top: 2%;
      border-radius: 8px;
      box-shadow: 0 2px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    .message {
      padding: 22px;
      text-align: center;
      height: 100%;
      overflow: hidden;
    }

    .message h2 {
      font-family: "Dancing Script", cursive;
      color: #d6336c;
      font-size: 2rem;
      margin-bottom: 15px;
    }

    #typing-text {
      font-size: 15px;
      color: #444;
      line-height: 1.8;
      white-space: pre-line;
      overflow-y: auto;
      max-height: 250px;
      min-height: 250px;
      scroll-behavior: smooth;
      padding-right: 5px;
    }

    .love-line {
      font-size: 20px;
      color: #d6336c;
      font-weight: 600;
      margin-top: 15px;
    }

    .ending {
      margin-top: 15px;
      font-style: italic;
      color: #555;
    }

    .signature {
      margin-top: 10px;
      font-family: "Dancing Script", cursive;
      font-size: 1.6rem;
      color: #d6336c;
    }

    .open .flap {
      transform: rotateX(180deg);
      transition: transform 0.5s ease, z-index 0.6s;
      z-index: 1;
    }

    .close .flap {
      transform: rotateX(0deg);
      transition: transform 0.5s 0.6s ease, z-index 1s;
      z-index: 5;
    }

    .open .letter {
      transform: translateY(-180px);
      transition: transform 0.5s 0.6s ease;
      z-index: 2;
    }

    .close .letter {
      transform: translateY(0px);
      transition: transform 0.5s ease;
      z-index: 1;
    }

    /* Hearts */

    .hearts {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      z-index: 2;
    }

    .heart {
      position: absolute;
      bottom: 0;
      right: 10%;
    }

    .heart:before,
    .heart:after {
      position: absolute;
      content: "";
      left: 25px;
      top: 0;
      width: 25px;
      height: 40px;
      background: #ff006e;
      border-radius: 25px 25px 0 0;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .heart:after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    .a1 {
      left: 20%;
      transform: scale(0.6);
      animation: slideUp 4s linear infinite;
    }

    .a2 {
      left: 50%;
      transform: scale(1);
      animation: slideUp 5s linear infinite;
    }

    .a3 {
      left: 75%;
      transform: scale(0.8);
      animation: slideUp 6s linear infinite;
    }

    @keyframes slideUp {
      0% {
        top: 0;
        opacity: 1;
      }

      100% {
        top: -500px;
        opacity: 0;
      }
    }

    /* Falling Roses */

    .rose-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .rose {
      position: absolute;
      top: -10%;
      font-size: 28px;
      animation: fall linear infinite;
      opacity: 0.8;
    }

    .rose:nth-child(1) {
      left: 5%;
      animation-duration: 8s;
    }

    .rose:nth-child(2) {
      left: 18%;
      animation-duration: 10s;
      animation-delay: 2s;
    }

    .rose:nth-child(3) {
      left: 32%;
      animation-duration: 7s;
      animation-delay: 1s;
    }

    .rose:nth-child(4) {
      left: 48%;
      animation-duration: 9s;
    }

    .rose:nth-child(5) {
      left: 62%;
      animation-duration: 11s;
      animation-delay: 3s;
    }

    .rose:nth-child(6) {
      left: 76%;
      animation-duration: 8s;
      animation-delay: 1s;
    }

    .rose:nth-child(7) {
      left: 88%;
      animation-duration: 10s;
    }

    .rose:nth-child(8) {
      left: 95%;
      animation-duration: 12s;
      animation-delay: 2s;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Buttons */

    .buttons {
      text-align: center;
      margin-top: -80px;
      position: relative;
      z-index: 2;
    }

    button {
      padding: 12px 22px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      background: #d6336c;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ad1457;
    }

    /* Mobile Responsive */

    @media screen and (max-width: 500px) {

      .main-title {
        font-size: 2.2rem;
        padding: 0 10px;
      }

      #envelope {
        width: 320px;
        height: 240px;
      }

      .flap {
        border-left: 160px solid transparent;
        border-right: 160px solid transparent;
        border-bottom: 120px solid transparent;
        border-top: 120px solid #d6336c;
      }

      .pocket {
        border-left: 160px solid #ff8fab;
        border-right: 160px solid #ff8fab;
        border-bottom: 120px solid #ff5d8f;
        border-top: 120px solid transparent;
      }

      .open .letter {
        transform: translateY(-140px);
      }

      #typing-text {
        font-size: 13px;
      }
    }

  </style>
</head>

<body>

  <!-- Falling Roses -->
  <div class="rose-container">
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
    <span class="rose">🌹</span>
  </div>

  <!-- Title -->
  <h1 class="main-title">
    For My Sherni, Mrinali ❤️
  </h1>

  <!-- Envelope -->
  <div class="envlope-wrapper">

    <div id="envelope" class="close">

      <div class="front flap"></div>
      <div class="front pocket"></div>

      <div class="letter">

        <div class="message">

          <h2>My Dearest Mrinali ❤️</h2>

          <div id="typing-text"></div>

          <p class="love-line">
            I love you, Mrinali. Always. ❤️
          </p>

          <p class="ending">
            If possible... forgive me someday.
          </p>

          <p class="signature">
            — Yours Forever ❤️
          </p>

        </div>

      </div>

      <!-- Floating Hearts -->
      <div class="hearts">
        <div class="heart a1"></div>
        <div class="heart a2"></div>
        <div class="heart a3"></div>
      </div>

    </div>

  </div>

  <!-- Buttons -->
  <div class="buttons">
    <button id="open">Open Letter ❤️</button>
    <button id="reset">Close</button>
  </div>

  <!-- Background Music -->
  <audio id="bg-music" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <!-- jQuery -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

  <script>

    $(document).ready(function () {

      const envelope = $("#envelope");
      const btnOpen = $("#open");
      const btnReset = $("#reset");

      const message = `
I know things have not been easy lately,
and I know I made mistakes that hurt you.

I am truly sorry for everything that caused you pain.

But more than anything,
I want you to remember who you are.

You are my Sherni —
strong, fearless, beautiful,
and capable of surviving every difficult phase.

Even when life becomes heavy,
please don't stop believing in yourself.

I believe in you endlessly.

And no matter how imperfect I am,
one thing will always remain true...
`;

      let index = 0;
      let typingStarted = false;

      envelope.click(function () {
        openLetter();
      });

      btnOpen.click(function () {
        openLetter();
      });

      btnReset.click(function () {
        closeLetter();
      });

      function openLetter() {

        document.getElementById("bg-music").play();

        envelope.addClass("open").removeClass("close");

        if (!typingStarted) {
          typingStarted = true;
          typeText();
        }
      }

      function closeLetter() {

        document.getElementById("bg-music").pause();

        envelope.addClass("close").removeClass("open");

        $("#typing-text").html("");

        index = 0;
        typingStarted = false;
      }

      function typeText() {

        if (index < message.length) {

          $("#typing-text").append(message.charAt(index));

          const typingBox = document.getElementById("typing-text");
          typingBox.scrollTop = typingBox.scrollHeight;

          index++;

          setTimeout(typeText, 45);
        }
      }

    });

  </script>

</body>

</html>
